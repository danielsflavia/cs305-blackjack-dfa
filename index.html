<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS305 Blackjack DFA — Automata Project</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>♠ Blackjack DFA ♥</h1>
  <p>CS305 Final Project — Finite Automata &amp; Blackjack</p>
</header>

<!-- ─── DFA Visualisation ──────────────────────────────────────────────────
  AUTOMATA THEORY NOTE:
  This SVG visualises the Deterministic Finite Automaton (DFA) that drives
  the blackjack game. A DFA is formally defined as a 5-tuple:
    M = (Q, Σ, δ, q0, F)
  where:
    Q  = finite set of states (the labelled nodes below)
    Σ  = alphabet of input symbols (DEAL, HIT, STAND, BUST, BLACKJACK, ...)
    δ  = transition function  δ: Q × Σ → Q
    q0 = initial/start state  (IDLE)
    F  = set of accepting / terminal states { WIN, LOSE, PUSH }
─────────────────────────────────────────────────────────────────────────── -->
<div id="dfa-panel">
  <h2>DFA — current game state</h2>
  <svg id="dfa-svg" viewBox="0 0 820 110" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
        <path d="M0,0 L7,3.5 L0,7 Z" fill="#c9a84c" opacity="0.7"/>
      </marker>
    </defs>

    <!-- Q — State nodes -->

    <!-- IDLE: q0, the start state -->
    <g id="s-IDLE">
      <rect x="4" y="30" width="80" height="36" rx="6"
            fill="rgba(0,0,0,0.4)" stroke="#c9a84c" stroke-width="1.5"/>
      <text x="44" y="53" text-anchor="middle"
            font-family="IBM Plex Mono" font-size="11" fill="#c9a84c">IDLE</text>
    </g>

    <!-- PLAYER_TURN: player is choosing hit or stand -->
    <g id="s-PLAYER">
      <rect x="130" y="30" width="100" height="36" rx="6"
            fill="rgba(0,0,0,0.4)" stroke="#c9a84c" stroke-width="1.5"/>
      <text x="180" y="53" text-anchor="middle"
            font-family="IBM Plex Mono" font-size="11" fill="#c9a84c">PLAYER_TURN</text>
    </g>

    <!-- DEALER_TURN: dealer is playing out its hand -->
    <g id="s-DEALER">
      <rect x="290" y="30" width="100" height="36" rx="6"
            fill="rgba(0,0,0,0.4)" stroke="#c9a84c" stroke-width="1.5"/>
      <text x="340" y="53" text-anchor="middle"
            font-family="IBM Plex Mono" font-size="11" fill="#c9a84c">DEALER_TURN</text>
    </g>

    <!-- WIN: accepting state (double border = convention for accepting states) -->
    <g id="s-WIN">
      <rect x="450" y="10" width="72" height="36" rx="6"
            fill="rgba(0,0,0,0.4)" stroke="#66bb6a" stroke-width="1.5"/>
      <rect x="454" y="14" width="64" height="28" rx="4"
            fill="none" stroke="#66bb6a" stroke-width="0.7"/>
      <text x="486" y="33" text-anchor="middle"
            font-family="IBM Plex Mono" font-size="11" fill="#66bb6a">WIN</text>
    </g>

    <!-- LOSE: accepting state (double border) -->
    <g id="s-LOSE">
      <rect x="450" y="60" width="72" height="36" rx="6"
            fill="rgba(0,0,0,0.4)" stroke="#ef5350" stroke-width="1.5"/>
      <rect x="454" y="64" width="64" height="28" rx="4"
            fill="none" stroke="#ef5350" stroke-width="0.7"/>
      <text x="486" y="83" text-anchor="middle"
            font-family="IBM Plex Mono" font-size="11" fill="#ef5350">LOSE</text>
    </g>

    <!-- PUSH: accepting state (double border) -->
    <g id="s-PUSH">
      <rect x="570" y="35" width="72" height="36" rx="6"
            fill="rgba(0,0,0,0.4)" stroke="#80cbc4" stroke-width="1.5"/>
      <rect x="574" y="39" width="64" height="28" rx="4"
            fill="none" stroke="#80cbc4" stroke-width="0.7"/>
      <text x="606" y="58" text-anchor="middle"
            font-family="IBM Plex Mono" font-size="11" fill="#80cbc4">PUSH</text>
    </g>

    <!-- δ — Transition arcs -->

    <!-- δ(IDLE, DEAL) = PLAYER_TURN -->
    <line x1="84" y1="48" x2="130" y2="48"
          stroke="#c9a84c" stroke-width="1" opacity="0.6" marker-end="url(#arr)"/>
    <text x="107" y="44" text-anchor="middle"
          font-family="IBM Plex Mono" font-size="9" fill="#8aab96">DEAL</text>

    <!-- δ(PLAYER_TURN, STAND) = DEALER_TURN -->
    <line x1="230" y1="48" x2="290" y2="48"
          stroke="#c9a84c" stroke-width="1" opacity="0.6" marker-end="url(#arr)"/>
    <text x="260" y="44" text-anchor="middle"
          font-family="IBM Plex Mono" font-size="9" fill="#8aab96">STAND</text>

    <!-- δ(PLAYER_TURN, HIT) = PLAYER_TURN (self-loop) -->
    <path d="M 155,30 Q 180,5 205,30"
          fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.5"
          marker-end="url(#arr)"/>
    <text x="180" y="12" text-anchor="middle"
          font-family="IBM Plex Mono" font-size="9" fill="#8aab96">HIT</text>

    <!-- δ(PLAYER_TURN, BUST) = LOSE -->
    <line x1="180" y1="66" x2="452" y2="80"
          stroke="#ef5350" stroke-width="1" opacity="0.5" marker-end="url(#arr)"/>
    <text x="300" y="82" text-anchor="middle"
          font-family="IBM Plex Mono" font-size="9" fill="#8aab96">BUST</text>

    <!-- δ(PLAYER_TURN, BLACKJACK) = WIN -->
    <line x1="180" y1="30" x2="452" y2="28"
          stroke="#66bb6a" stroke-width="1" opacity="0.5" marker-end="url(#arr)"/>
    <text x="310" y="23" text-anchor="middle"
          font-family="IBM Plex Mono" font-size="9" fill="#8aab96">BLACKJACK</text>

    <!-- δ(DEALER_TURN, WIN) = WIN -->
    <line x1="390" y1="38" x2="452" y2="28"
          stroke="#66bb6a" stroke-width="1" opacity="0.5" marker-end="url(#arr)"/>

    <!-- δ(DEALER_TURN, LOSE) = LOSE -->
    <line x1="390" y1="58" x2="452" y2="72"
          stroke="#ef5350" stroke-width="1" opacity="0.5" marker-end="url(#arr)"/>

    <!-- δ(DEALER_TURN, PUSH) = PUSH -->
    <line x1="390" y1="48" x2="570" y2="53"
          stroke="#80cbc4" stroke-width="1" opacity="0.4" marker-end="url(#arr)"/>
    <text x="480" y="49" text-anchor="middle"
          font-family="IBM Plex Mono" font-size="9" fill="#8aab96">PUSH</text>

    <!-- Reset arc: F → q0 (dfa.reset() returns machine to IDLE after each round) -->
    <path d="M 486,96 Q 486,107 44,107 Q 44,107 44,66"
          fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.35"
          stroke-dasharray="4,3" marker-end="url(#arr)"/>
    <text x="260" y="110" text-anchor="middle"
          font-family="IBM Plex Mono" font-size="9" fill="#8aab96" opacity="0.6">DEAL (reset)</text>

    <!-- Animated highlight — JS moves this to the active state node -->
    <rect id="dfa-highlight" x="4" y="30" width="80" height="36" rx="6"
          fill="none" stroke="#f0d080" stroke-width="2.5" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.4s" repeatCount="indefinite"/>
    </rect>
  </svg>
</div>

<!-- ─── Main Game Layout ─────────────────────────────────────────────────── -->
<div id="game-wrap">

  <div id="table-area">
    <div id="msg-box">Place your bet and deal to begin.</div>

    <div class="zone">
      <div class="zone-label">Dealer</div>
      <div class="hand" id="dealer-hand"></div>
      <div class="hand-score" id="dealer-score"></div>
    </div>

    <div class="zone">
      <div class="zone-label">Player</div>
      <div class="hand" id="player-hand"></div>
      <div class="hand-score" id="player-score"></div>
    </div>

    <div id="controls">
      <button id="btn-deal"  onclick="gameDeal()">Deal</button>
      <button id="btn-hit"   onclick="gameHit()"   disabled>Hit</button>
      <button id="btn-stand" onclick="gameStand()" disabled>Stand</button>
    </div>
  </div>

  <div id="sidebar">

    <div id="balance-panel" class="zone">
      <div class="zone-label">Balance &amp; Bet</div>
      <div id="balance-val">$500</div>
      <div id="bet-val">Bet: $0</div>
      <div class="chip-row">
        <div class="chip chip-1"   onclick="addBet(1)"  >$1</div>
        <div class="chip chip-5"   onclick="addBet(5)"  >$5</div>
        <div class="chip chip-25"  onclick="addBet(25)" >$25</div>
        <div class="chip chip-100" onclick="addBet(100)">$100</div>
      </div>
      <button id="btn-clear-bet" onclick="clearBet()">Clear bet</button>
    </div>

    <div id="log-panel" class="zone">
      <div class="zone-label">DFA transition log</div>
      <div id="log-list"></div>
    </div>

  </div>
</div>

<script src="dfa.js"></script>
<script src="deck.js"></script>
<script src="game.js"></script>
<script src="ui.js"></script>
</body>
</html>
