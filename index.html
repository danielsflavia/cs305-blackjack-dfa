<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CS305 Blackjack DFA — Automata Project</title>
  <style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap');

:root {
  --felt:   #1a3d2b;
  --felt2:  #15321f;
  --gold:   #c9a84c;
  --gold2:  #f0d080;
  --cream:  #f8f3e8;
  --red:    #c0392b;
  --dark:   #0e1f14;
  --text:   #f8f3e8;
  --muted:  #8aab96;
  --panel:  rgba(0,0,0,0.35);
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--felt2);
  background-image: radial-gradient(ellipse at 50% 0%, #1e4a30 0%, #0e1f14 70%);
  font-family: 'IBM Plex Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 12px 40px;
  gap: 16px;
}

header { text-align: center; }
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  color: var(--gold2);
}
header p {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
}

#dfa-panel {
  width: 100%;
  max-width: 860px;
  background: var(--panel);
  border-radius: var(--radius);
  padding: 12px 16px;
}

svg#dfa-svg { width: 100%; height: 110px; }

/* 🔥 UPDATED: THICKER ACTIVE STATE */
svg#dfa-svg g.dfa-state-active rect:first-child {
  stroke-width: 5;
  opacity: 1;
}

/* 🔥 UPDATED: LOG VISIBILITY */
#log-list span {
  padding: 4px 8px;
  font-size: 0.7rem;
  font-weight: 500;
  border-left: 4px solid #c9a84c;
}

/* 🔥 UPDATED: ACCEPTING STATES */
#log-list span.highlight {
  background: var(--gold2);
  font-weight: 700;
  border-left: 6px solid #0e1f14;
  padding: 4px 8px;
}

  </style>
</head>
<body>

<header>
  <h1>♠ Blackjack DFA ♥</h1>
  <p>CS305 Final Project</p>
</header>

<div id="dfa-panel">
  <svg id="dfa-svg" viewBox="0 0 820 110">

    <!-- STATES (unchanged) -->

    <g id="s-IDLE">
      <rect x="4" y="30" width="80" height="36" rx="6"
            fill="rgba(0,0,0,0.4)" stroke="#c9a84c"/>
      <text x="44" y="53" text-anchor="middle">IDLE</text>
    </g>

    <g id="s-PLAYER">
      <rect x="130" y="30" width="100" height="36" rx="6"
            fill="rgba(0,0,0,0.4)" stroke="#c9a84c"/>
      <text x="180" y="53" text-anchor="middle">PLAYER_TURN</text>
    </g>

    <g id="s-DEALER">
      <rect x="290" y="30" width="100" height="36" rx="6"
            fill="rgba(0,0,0,0.4)" stroke="#c9a84c"/>
      <text x="340" y="53" text-anchor="middle">DEALER_TURN</text>
    </g>

    <g id="s-WIN">
      <rect x="450" y="10" width="72" height="36" rx="6"
            fill="rgba(0,0,0,0.4)" stroke="#66bb6a"/>
      <text x="486" y="33" text-anchor="middle">WIN</text>
    </g>

    <g id="s-LOSE">
      <rect x="450" y="60" width="72" height="36" rx="6"
            fill="rgba(0,0,0,0.4)" stroke="#ef5350"/>
      <text x="486" y="83" text-anchor="middle">LOSE</text>
    </g>

    <g id="s-PUSH">
      <rect x="570" y="35" width="72" height="36" rx="6"
            fill="rgba(0,0,0,0.4)" stroke="#80cbc4"/>
      <text x="606" y="58" text-anchor="middle">PUSH</text>
    </g>

    <!-- 🔥 UPDATED HIGHLIGHT BOX -->
    <rect id="dfa-highlight" x="4" y="30" width="80" height="36" rx="6"
          fill="none" stroke="#f0d080" stroke-width="8" opacity="1"/>
  </svg>
</div>

<div id="log-list"></div>

<script src="dfa.js"></script>
<script src="game.js"></script>
<script src="ui.js"></script>

</body>
</html>
